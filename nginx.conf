server {
    listen 80;
    server_name _;

    # Docker's internal DNS — резолвит имена контейнеров в runtime, не при старте
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;

    # React Router — все маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API-запросов к FastAPI бэкенду
    # Переменная заставляет nginx резолвить имя в runtime, а не при старте
    location /api/ {
        set $upstream http://backend:8000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Долгое кеширование статических ассетов (js/css/fonts/images)
    location ~* \.(js|css|woff|woff2|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Отключить логи для favicon и robots.txt
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
